
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes scanline { 0%{top:-10%} 100%{top:110%} }
@keyframes zoomSlow { 0%{transform:scale(1)} 100%{transform:scale(1.08)} }
</style>

<div id="player" style="background:#000;width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;border-radius:10px;font-family:system-ui,sans-serif;cursor:pointer;animation:fadeIn .4s ease;" onclick="toggleUI()">

  <!-- Thumbnail with slow zoom -->
  <img src="https://picsum.photos/seed/pk_nyc/1280/720" style="width:100%;height:100%;object-fit:cover;display:block;animation:zoomSlow 18s ease-in-out infinite alternate;" />

  <!-- CRT scanline effect -->
  <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:1;"></div>

  <!-- Moving scanline -->
  <div style="position:absolute;left:0;right:0;height:3%;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.025),transparent);animation:scanline 6s linear infinite;pointer-events:none;z-index:2;"></div>

  <!-- Dark gradient overlays -->
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.1) 40%,transparent 65%,rgba(0,0,0,.6) 100%);z-index:3;"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.4) 0%,transparent 40%,transparent 60%,rgba(0,0,0,.4) 100%);z-index:3;"></div>

  <!-- === TOP BAR === -->
  <div id="ui-top" style="position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:10;animation:fadeIn .3s ease;">
    <!-- Channel bug -->
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 10px;backdrop-filter:blur(6px);">
        <span style="font-size:12px;font-weight:900;color:#fff;letter-spacing:.08em;">DMEG<span style="color:#6366f1">.TV</span></span>
      </div>
      <div style="background:rgba(0,0,0,.6);border:1px solid #fbbf2455;border-radius:5px;padding:3px 9px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px;">
        <span style="font-size:9px;font-weight:800;color:#fbbf24;letter-spacing:.1em;">◈ PHOTO</span>
      </div>
    </div>
    <!-- Top right: close + share -->
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="event.stopPropagation();shareItem()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#ccc;padding:6px 13px;font-size:11px;font-weight:600;backdrop-filter:blur(6px);cursor:pointer;display:flex;align-items:center;gap:5px;">
        🔗 Share <span style="color:#a78bfa;font-size:10px;">+1.5 ME</span>
      </button>
      <button onclick="event.stopPropagation();closePlayer()" style="background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#fff;padding:6px 13px;font-size:11px;font-weight:600;backdrop-filter:blur(6px);cursor:pointer;">
        ✕ Exit
      </button>
    </div>
  </div>

  <!-- === PHOTO GALLERY DOTS (since it's photo type) === -->
  <div id="ui-dots" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:12px;">
    <!-- Nav arrows -->
    <div style="display:flex;gap:20px;align-items:center;">
      <button onclick="event.stopPropagation();prevPhoto()" style="width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;">‹</button>
      <div style="text-align:center;">
        <div id="photo-counter" style="font-size:11px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:.08em;">1 / 8</div>
      </div>
      <button onclick="event.stopPropagation();nextPhoto()" style="width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;">›</button>
    </div>
    <!-- Dot indicators -->
    <div id="dots" style="display:flex;gap:6px;"></div>
  </div>

  <!-- === BOTTOM INFO BAR === -->
  <div id="ui-bottom" style="position:absolute;bottom:0;left:0;right:0;padding:16px 18px 14px;z-index:10;animation:slideUp .4s ease;">

    <!-- Creator row -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <!-- Avatar -->
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;border:2px solid rgba(255,255,255,.2);flex-shrink:0;">PK</div>
        <div>
          <div style="font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px;">
            PixelKingz <span style="color:#6366f1;font-size:10px;">✓</span>
            <span style="background:#6366f122;border:1px solid #6366f155;border-radius:4px;padding:1px 6px;font-size:9px;color:#a5b4fc;font-weight:600;">◈ CREATOR</span>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:1px;">@pixelkingz · 25m ago</div>
        </div>
      </div>
      <!-- Stock + follow -->
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="text-align:right;">
          <div style="font-size:14px;font-weight:800;color:#a78bfa;">1,100 ME</div>
          <div id="stock-change" style="font-size:10px;color:#34d399;font-weight:600;">↑ +3.2%</div>
        </div>
        <button onclick="event.stopPropagation();investAction()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;color:#fff;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em;">📈 Invest</button>
      </div>
    </div>

    <!-- Title -->
    <div style="margin-bottom:8px;">
      <div style="font-size:18px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:4px;">Behind the Lens — NYC Set</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);">Photography Series · 8 photos · 1.2K views</div>
    </div>

    <!-- Stats row -->
    <div style="display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:#555;">◈</span><span style="font-size:10px;color:rgba(255,255,255,.5);">1,200 views</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:#555;">♥</span><span style="font-size:10px;color:rgba(255,255,255,.5);">247 likes</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:#555;">💬</span><span style="font-size:10px;color:rgba(255,255,255,.5);">38 comments</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:#a78bfa;">⚡</span><span style="font-size:10px;color:#a78bfa;font-weight:600;">+5.0 ME earned viewing</span></div>
    </div>

    <!-- Action bar -->
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="event.stopPropagation();likeAction()" id="like-btn" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#ccc;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;flex:1;justify-content:center;">♥ Like</button>
      <button onclick="event.stopPropagation();commentAction()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#ccc;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;flex:1;justify-content:center;">💬 Comment</button>
      <button onclick="event.stopPropagation();shareAction()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#ccc;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;flex:1;justify-content:center;">🔗 Share</button>
      <button onclick="event.stopPropagation();tipAction()" style="display:flex;align-items:center;gap:5px;background:rgba(167,139,250,.12);border:1px solid #a78bfa55;border-radius:8px;color:#a78bfa;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;flex:1;justify-content:center;">⚡ Tip ME</button>
    </div>
  </div>

  <!-- === TOAST NOTIFICATION === -->
  <div id="toast" style="position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.92);border:1px solid #6366f166;border-radius:8px;padding:9px 18px;font-size:12px;color:#fff;font-weight:600;z-index:20;display:none;white-space:nowrap;backdrop-filter:blur(8px);animation:slideUp .2s ease;"></div>

  <!-- === LIVE TICKER === -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,#6366f155,transparent);z-index:10;"></div>

</div>

<!-- Thumbnail strip below player -->
<div style="background:#08080f;border:1px solid #12122a;border-top:none;border-radius:0 0 10px 10px;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;" id="thumb-strip">
</div>

<script>
const SEEDS = ["pk_nyc","pk_nyc2","pk_nyc3","pk_nyc4","pk_nyc5","pk_nyc6","pk_nyc7","pk_nyc8"];
let currentPhoto = 0;
let uiVisible = true;
let liked = false;
let likeCount = 247;

function buildDots() {
  const d = document.getElementById("dots");
  d.innerHTML = SEEDS.map((_, i) => `<div onclick="event.stopPropagation();goPhoto(${i})" id="dot-${i}" style="width:${i===0?20:6}px;height:6px;border-radius:3px;background:${i===0?"#6366f1":"rgba(255,255,255,.25)"};transition:all .25s;cursor:pointer;"></div>`).join("");
}

function buildStrip() {
  const s = document.getElementById("thumb-strip");
  s.innerHTML = SEEDS.map((seed, i) => `<div onclick="goPhoto(${i})" id="strip-${i}" style="flex-shrink:0;width:64px;height:40px;border-radius:5px;overflow:hidden;cursor:pointer;border:${i===0?"2px solid #6366f1":"1.5px solid #1a1a2a"};transition:border-color .2s;opacity:${i===0?1:.6};transition:opacity .2s;">
    <img src="https://picsum.photos/seed/${seed}/128/80" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>`).join("");
}

function goPhoto(i) {
  const prev = currentPhoto;
  currentPhoto = i;
  const img = document.querySelector("#player img");
  img.style.opacity = "0";
  setTimeout(() => {
    img.src = `https://picsum.photos/seed/${SEEDS[i]}/1280/720`;
    img.style.opacity = "1";
    img.style.transition = "opacity .3s ease";
  }, 150);
  document.getElementById("photo-counter").textContent = `${i+1} / ${SEEDS.length}`;
  // dots
  document.querySelectorAll("[id^=dot-]").forEach((d,j) => {
    d.style.width = j===i ? "20px" : "6px";
    d.style.background = j===i ? "#6366f1" : "rgba(255,255,255,.25)";
  });
  // strip
  document.querySelectorAll("[id^=strip-]").forEach((s,j) => {
    s.style.borderColor = j===i ? "#6366f1" : "#1a1a2a";
    s.style.opacity = j===i ? "1" : "0.6";
  });
}

function nextPhoto() { goPhoto((currentPhoto+1) % SEEDS.length); }
function prevPhoto() { goPhoto((currentPhoto-1+SEEDS.length) % SEEDS.length); }

function toggleUI() {
  uiVisible = !uiVisible;
  ["ui-top","ui-bottom","ui-dots"].forEach(id => {
    document.getElementById(id).style.opacity = uiVisible ? "1" : "0";
    document.getElementById(id).style.transition = "opacity .3s";
  });
}

function showToast(msg, color="#fff") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.color = color;
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = "none", 2200);
}

function likeAction() {
  liked = !liked;
  likeCount += liked ? 1 : -1;
  const btn = document.getElementById("like-btn");
  btn.style.background = liked ? "rgba(239,68,68,.15)" : "rgba(255,255,255,.06)";
  btn.style.borderColor = liked ? "#ef4444aa" : "rgba(255,255,255,.1)";
  btn.style.color = liked ? "#f87171" : "#ccc";
  btn.textContent = liked ? `♥ ${likeCount}` : `♥ Like`;
  showToast(liked ? "♥ Liked! +1.5 ME earned" : "Unliked", liked ? "#f87171" : "#888");
}

function shareAction() { showToast("🔗 Link copied — +1.5 ME added to wallet", "#34d399"); }
function shareItem() { showToast("🔗 Link copied — +1.5 ME added to wallet", "#34d399"); }
function commentAction() { showToast("💬 +1.5 ME for commenting", "#a78bfa"); }
function tipAction() { showToast("⚡ 10 ME tipped to @pixelkingz", "#a78bfa"); }
function investAction() { showToast("📈 Redirecting to $PIXELKINGZ fan stock...", "#6366f1"); }
function closePlayer() { showToast("← Back to TV feed", "#888"); }

// Simulate stock price micro-fluctuation
setInterval(() => {
  const change = ((Math.random() - 0.45) * 1.2).toFixed(1);
  const el = document.getElementById("stock-change");
  const up = parseFloat(change) >= 0;
  el.textContent = `${up ? "↑" : "↓"} ${up ? "+" : ""}${change}%`;
  el.style.color = up ? "#34d399" : "#f87171";
}, 3000);

buildDots();
buildStrip();
</script>
